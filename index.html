<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Web Tools</title>

  <!-- ✅ UET 基础代码（必须存在） -->
  <script>
  (function (w,d,t,r,u) {
    var f,n,i;
    w[u]=w[u]||[];
    f=function () {
      var o={ti:"187259026"};
      o.q=w[u];
      w[u]=new UET(o);
      w[u].push("pageLoad");
    };
    n=d.createElement(t);
    n.src=r;
    n.async=1;
    n.onload=n.onreadystatechange=function () {
      var s=this.readyState;
      s&&s!=="loaded"&&s!=="complete"||(f(),n.onload=n.onreadystatechange=null);
    };
    i=d.getElementsByTagName(t)[0];
    i.parentNode.insertBefore(n,i);
  })(window,document,"script","https://bat.bing.com/bat.js","uetq");
  </script>

  <!-- ✅ 获取 msclkid -->
  <script>
    function getMsclkid() {
      const params = new URLSearchParams(window.location.search);
      return params.get("msclkid");
    }

    // 页面加载时保存 msclkid
    window.onload = function () {
      const msclkid = getMsclkid();
      if (msclkid) {
        localStorage.setItem("msclkid", msclkid);
        console.log("✅ msclkid saved:", msclkid);
      }
    };
  </script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 50px;
    }
    button {
      padding: 12px 24px;
      font-size: 16px;
      background: #0078d4;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>Welcome to My Test Page</h1>
  <p>Click button to simulate conversion</p>
  <p id="msclkid-display"></p>

  <!-- ✅ 转化按钮 -->
  <button onclick="trackConversion()">Submit</button>

  <!-- ✅ 转化事件代码 -->
  <script>
    function trackConversion() {
      const msclkid = localStorage.getItem("msclkid");
      document.getElementById("msclkid-display").innerText = "msclkid = " + msclkid;

      window.uetq = window.uetq || [];
      window.uetq.push('event', 'button_click', {
        event_category: 'engagement',
        event_label: 'submit_button',
        msclkid: msclkid
      });

      console.log("✅ Conversion tracked. msclkid:", msclkid);

      alert("Conversion sent ✅");
    }
  </script>

</body>
</html>
